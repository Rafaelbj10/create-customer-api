# ===========================================
# SERVER
# ===========================================
server.port=8080
spring.application.name=create-customer-api
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
# ===========================================
# DATABASE
# ===========================================
spring.datasource.url=jdbc:mysql://localhost:3306/digibank
spring.datasource.username=root
spring.datasource.password=abcde123
# ===========================================
# JPA
# ===========================================
# ===========================================
# FEIGN CLIENT
# ===========================================
feign.customer.config.default.connectTimeout=5000
feign.customer.config.default.readTimeout=5000
feign.customer.config.viacep-customer.connectTimeout=3000
feign.customer.config.viacep-customer.readTimeout=3000
# ===========================================
# AWS (Credenciais diretas - prefira env vars em prod)
# ===========================================
aws.region=us-east-1
aws.access-key-id=your-access-key
aws.secret-access-key=your-secret-key
aws.sns.customer-created-topic-arn=arn:aws:sns:us-east-1:000000000000:customer-created-topic
# ===========================================
# AWS / LOCALSTACK
# ===========================================
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.credentials.access-key=test
spring.cloud.aws.credentials.secret-key=test
spring.cloud.aws.credentials.instance-profile=false
spring.cloud.aws.endpoint=http://localhost:4566
cloud.aws.sqs.endpoint=http://localhost:4566
spring.cloud.aws.sqs.listener.max-number-of-messages=10
# ===========================================
# OBSERVABILIDADE - ACTUATOR
# ===========================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
# ===========================================
# OBSERVABILIDADE - TRACING (OTLP)
# ===========================================
management.tracing.sampling.probability=1.0
otel.exporter.otlp.endpoint=http://localhost:4317
# ===========================================
# LOGGING
# ===========================================
logging.level.customers.com.create.customer.ZipCodeClient=DEBUG
logging.level.feign=DEBUG